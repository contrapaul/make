<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemotron Bows</title>
    <style>
        * {
            margin:  0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(80, 40, 160, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(40, 100, 180, 0.15) 0%, transparent 50%);
        }

        h1 {
            color: #e0d8f0;
            font-size: 2.4rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: #6a6a8a;
            font-size: 0.95rem;
            letter-spacing: 2px;
            margin-bottom: 48px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
            max-width: 800px;
            width: 100%;
        }

        .grid a {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #b0a8cc;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .grid a::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(120, 80, 220, 0.2), rgba(60, 140, 220, 0.2));
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 12px;
        }

        .grid a:hover {
            color: #ffffff;
            border-color: rgba(120, 80, 220, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(100, 60, 200, 0.15);
        }

        .grid a:hover::before {
            opacity: 1;
        }

        .grid a span {
            position: relative;
            z-index: 1;
        }

        footer {
            margin-top: 56px;
            color: #3a3a5a;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1>Nemotron</h1>
    <p class="subtitle">Select a bow to explore</p>

    <div class="grid" id="grid"></div>

    <footer>make.contrapaul.com</footer>

    <script>
        const grid = document.getElementById('grid');
        const base = 'https://make.contrapaul.com/fun/nemotron/';

        for (let i = 1; i <= 20; i++) {
            const a = document.createElement('a');
            a.href = base + 'bow' + i + '.html';
            a.innerHTML = '<span>Bow ' + i + '</span>';
            grid.appendChild(a);
        }
    </script>

</body>
</html>
