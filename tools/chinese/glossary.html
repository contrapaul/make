<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glossary · 汉语词汇</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<nav class="sidebar" id="sidebar" aria-label="Site navigation">
  <div class="sidebar-header">
    <div class="seal-mark" aria-hidden="true"><span>汉</span><span>语</span><span>词</span><span>汇</span></div>
    <div>
      <div class="sidebar-title">汉语词汇</div>
      <div class="sidebar-subtitle">Vocabulary Review</div>
    </div>
  </div>
  <div class="sidebar-nav">
    <div class="sidebar-section-label">Tools</div>
    <a href="index.html" class="sidebar-link"><span class="glyph">首</span> Home</a>
    <a href="lessons.html" class="sidebar-link tool-link"><span class="glyph">课</span> Lessons</a>
    <a href="glossary.html" class="sidebar-link tool-link active"><span class="glyph">词</span> Glossary</a>
    <a href="sentence-builder.html" class="sidebar-link tool-link"><span class="glyph">句</span> Sentence Builder</a>
    <a href="tone-trainer.html" class="sidebar-link tool-link"><span class="glyph">声</span> Tone Trainer</a>
    <a href="chinese_vocab_anki.apkg" class="sidebar-link tool-link" download><span class="glyph">卡</span> Anki Deck</a>
  </div>
</nav>

<div class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle menu">≡</button>
      <span class="topbar-title">词 · Glossary</span>
    </div>
    <div class="topbar-controls">
      <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">暗</button>
    </div>
  </header>

  <div class="page-section" style="padding-bottom:16px">
    <h2 class="section-title">Glossary</h2>
    <p class="section-subtitle">Search and filter all <span id="countVocab">…</span> vocabulary entries. Results update live.</p>

    <div class="glossary-controls">
      <input type="search" class="search-input" id="searchInput" placeholder="Search hanzi, pinyin, or definition…" autocomplete="off">
      <select class="filter-select" id="filterLesson"><option value="">All lessons</option></select>
      <select class="filter-select" id="filterType"><option value="">All types</option></select>
      <select class="filter-select" id="filterTopic"><option value="">All topics</option></select>
      <select class="filter-select" id="filterHsk"><option value="">All HSK</option></select>
      <span class="results-count" id="resultsCount"></span>
      <button class="btn btn-ghost btn-sm" id="clearFilters">Clear</button>
    </div>

    <div style="overflow-x:auto">
      <table class="vocab-table" id="glossaryTable">
        <thead>
          <tr>
            <th data-col="hanzi">Hanzi <span class="sort-indicator">↕</span></th>
            <th data-col="pinyin">Pinyin <span class="sort-indicator">↕</span></th>
            <th data-col="definition">Definition <span class="sort-indicator">↕</span></th>
            <th>Example</th>
            <th>Tags</th>
          </tr>
        </thead>
        <tbody id="glossaryBody"></tbody>
      </table>
    </div>
  </div>
</div>

<nav class="tabbar" aria-label="Primary">
  <a href="index.html"><span class="glyph">首</span>Home</a>
  <a href="lessons.html"><span class="glyph">课</span>Lessons</a>
  <a href="glossary.html" class="active"><span class="glyph">词</span>Glossary</a>
  <a href="sentence-builder.html"><span class="glyph">句</span>Builder</a>
  <a href="tone-trainer.html"><span class="glyph">声</span>Tones</a>
</nav>

<script src="js/data.js"></script>
<script src="js/format.js"></script>
<script src="js/glossary.js"></script>
<script>
  // Shared theme + sidebar logic
  (function(){
    const t = localStorage.getItem('cv-theme')||'light';
    document.documentElement.setAttribute('data-theme', t);
  })();
  document.addEventListener('DOMContentLoaded', () => {
    const themeBtn = document.getElementById('themeToggle');
    const sidebar  = document.getElementById('sidebar');
    const overlay  = document.getElementById('sidebarOverlay');
    const toggle   = document.getElementById('sidebarToggle');
    function applyTheme(t){
      document.documentElement.setAttribute('data-theme',t);
      localStorage.setItem('cv-theme',t);
      if(themeBtn) themeBtn.textContent = t==='dark'?'亮':'暗';
    }
    applyTheme(localStorage.getItem('cv-theme')||'light');
    themeBtn?.addEventListener('click',()=>{
      applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
    });
    toggle?.addEventListener('click',()=>{ sidebar?.classList.add('open'); overlay?.classList.add('open'); });
    overlay?.addEventListener('click',()=>{ sidebar?.classList.remove('open'); overlay?.classList.remove('open'); });
  });
</script>
</body>
</html>
